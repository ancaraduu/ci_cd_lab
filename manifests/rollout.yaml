apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: go-simple-webserver
  labels:
    app: go-simple-webserver
spec:
  replicas: 10
  strategy:
    canary:
      steps:
        - setWeight: 25
        - pause: { duration: 120s } # Pauză 2 minute
        - setWeight: 75
        - pause: { duration: 120s } # Pauză 2 minute
        - setWeight: 100
  selector:
    matchLabels:
      app: go-simple-webserver
  template:
    metadata:
      labels:
        app: go-simple-webserver
    spec:
      containers:
        - name: webserver
          image: ghcr.io/ancaraduu/go-simple-webserver@sha256:5280789615047b151e290c21ea6ee707356b7bbcf85bec59a0df4ece61d8cb58
          ports:
            - containerPort: 8080
          imagePullPolicy: Always
